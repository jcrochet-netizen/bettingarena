name: Refresh WC26 group standings

on:
  schedule:
    # Two parallel schedules, each every 15 min, offset off the rounded
    # quarter-hours where GitHub Actions cron is heavily throttled.
    - cron: "3,18,33,48 * * * *"
    - cron: "10,25,40,55 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-wc-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest standings
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: node fetch-wc-data.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- wc-data.json; then
            echo "No change — nothing to commit."
          else
            git add wc-data.json
            git commit -m "chore: refresh WC26 group standings [skip ci]"
            git push
            echo "Standings updated and pushed."
          fi
